<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Australian QSR Deep-Dive — KFC Australia Strategy Support</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--kfc-red:#e4002b;--kfc-deep:#a3001e;--ink:#141414;--ink-soft:#3a3a3a;--paper:#faf8f5;--cream:#f2ede3;--white:#ffffff;--line:#e3dccd;--navy:#26436b;--gold:#b08a2e;--green:#3f6d4e}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.65;-webkit-font-smoothing:antialiased}
.serif{font-family:'Fraunces',Georgia,serif}
.mono{font-family:'IBM Plex Mono',monospace}
.stripe-bar{height:14px;border-bottom:2px solid var(--ink)}
.stripes{background:repeating-linear-gradient(180deg,var(--kfc-red) 0 15%,var(--white) 15% 30%)}
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px;padding:12px clamp(18px,3vw,36px);background:var(--paper);border-bottom:2px solid var(--ink)}
.topbar .mark{width:38px;height:38px;flex:none}
.topbar .wordmark{font-family:'Archivo Black',sans-serif;font-size:17px;letter-spacing:.08em;text-transform:uppercase}
.topbar .wordmark .k{color:var(--kfc-red)}
.topbar .meta{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);letter-spacing:.04em;text-transform:uppercase}
.hero{position:relative;overflow:hidden;padding:clamp(40px,5vw,72px) clamp(22px,4.5vw,72px) clamp(48px,6vw,80px);border-bottom:2px solid var(--ink)}
.hero-inner{position:relative;z-index:1;max-width:1180px;margin:0 auto}
.hero-kicker{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--kfc-red);margin-bottom:22px;display:flex;align-items:center;gap:12px}
.hero-kicker::before{content:"";width:44px;height:2px;background:var(--kfc-red)}
.hero-title{font-family:'Archivo Black',sans-serif;font-size:clamp(40px,5.6vw,84px);line-height:.98;letter-spacing:-.005em;text-transform:uppercase;max-width:16ch}
.hero-title .red{color:var(--kfc-red)}
.hero-sub{margin-top:26px;max-width:56ch;font-size:clamp(15px,1.35vw,18px);color:var(--ink-soft)}
.hero-bucket{position:absolute;right:clamp(10px,5vw,90px);top:50%;transform:translateY(-50%);width:min(88%,440px);max-width:34vw;margin-right:clamp(10px,3vw,70px);z-index:0;pointer-events:none}
.hero-bucket .halo{position:absolute;inset:-12%;border-radius:50%;background:repeating-conic-gradient(var(--kfc-red) 0 12deg,var(--white) 12deg 24deg);animation:spin 40s linear infinite;z-index:0}
.hero-bucket img{position:relative;z-index:1;width:100%;filter:drop-shadow(0 34px 44px rgba(20,0,0,.35))}
@keyframes spin{to{transform:rotate(360deg)}}
.hero-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:2px;margin-top:44px;border:2px solid var(--ink);background:var(--ink);max-width:820px}
.hero-stat{background:var(--white);padding:16px 18px}
.hero-stat .n{font-family:'Archivo Black',sans-serif;font-size:26px;color:var(--kfc-red)}
.hero-stat .l{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-top:4px}
.ticker{background:var(--ink);color:var(--white);overflow:hidden;border-bottom:2px solid var(--ink)}
.ticker-track{display:flex;white-space:nowrap;width:max-content;animation:tick 30s linear infinite}
.ticker span{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:10px 0}
.ticker .sep{color:var(--kfc-red);padding:10px 18px}
@keyframes tick{to{transform:translateX(-50%)}}
.shell{display:grid;grid-template-columns:250px minmax(0,1fr);max-width:1180px;margin:0 auto;padding:0 clamp(22px,4.5vw,72px);gap:clamp(28px,3.5vw,56px)}
.rail{position:sticky;top:76px;align-self:start;padding:34px 0;height:calc(100vh - 76px);overflow:auto}
.rail::-webkit-scrollbar{width:0}
.rail-title{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--kfc-red);margin-bottom:16px}
.rail a{display:flex;gap:10px;align-items:baseline;padding:7px 0;color:var(--ink-soft);text-decoration:none;font-size:13px;font-weight:500;border-left:2px solid var(--line);padding-left:12px;transition:all .18s}
.rail a .num{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--kfc-red);min-width:22px}
.rail a:hover{color:var(--ink);border-left-color:var(--kfc-red)}
.rail a.on{color:var(--ink);border-left-color:var(--kfc-red);font-weight:700}
.rail-foot{margin-top:28px;border-top:1px solid var(--line);padding-top:16px}
.rail-foot .mini-stripes{height:36px;border:2px solid var(--ink);margin-bottom:12px}
.rail-foot p{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-soft);letter-spacing:.04em}
main{min-width:0;padding:34px 0 90px}
section{margin-bottom:74px;scroll-margin-top:90px}
.sec-head{display:flex;align-items:baseline;gap:16px;border-bottom:2px solid var(--ink);padding-bottom:12px;margin-bottom:26px}
.sec-num{font-family:'Archivo Black',sans-serif;font-size:30px;color:var(--kfc-red)}
.sec-title{font-family:'Archivo Black',sans-serif;font-size:clamp(19px,2vw,25px);text-transform:uppercase;letter-spacing:.02em}
.sec-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);margin-left:auto;text-transform:uppercase;letter-spacing:.06em}
p{margin-bottom:14px;font-size:14.5px;color:#2b2b2b}
p.lede{font-family:'Fraunces',Georgia,serif;font-size:19px;line-height:1.55;color:var(--ink);margin-bottom:18px}
.card{background:var(--white);border:2px solid var(--ink);padding:20px 22px;margin:22px 0}
.card h4{font-family:'Archivo Black',sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;color:var(--ink)}
.card h4 .tag{color:var(--kfc-red);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;margin-right:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
caption{caption-side:top;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--kfc-red);padding-bottom:8px}
th{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;text-align:left;padding:9px 10px;background:var(--cream);border-bottom:2px solid var(--ink);color:var(--ink)}
td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
tr:hover td{background:#fbf6ef}
.kfc-row td{background:#fdeef1;font-weight:600}
.kfc-row td:first-child{color:var(--kfc-red)}
.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.up{color:var(--green);font-weight:600}
.dn{color:var(--kfc-red);font-weight:600}
.chart{width:100%;height:340px;margin:6px 0 4px}
.chart-note{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-soft);border-top:1px dashed var(--line);padding-top:8px;margin-top:6px}
.callout{border-left:4px solid var(--kfc-red);background:var(--cream);padding:16px 20px;margin:22px 0}
.callout .ct{font-family:'Archivo Black',sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--kfc-red);margin-bottom:6px}
.callout p{font-family:'Fraunces',Georgia,serif;font-size:15.5px;color:var(--ink);margin-bottom:0}
.quote{font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:16.5px;color:var(--ink);border-left:4px solid var(--ink);padding:4px 0 4px 18px;margin:20px 0}
.quote .who{display:block;font-family:'IBM Plex Mono',monospace;font-style:normal;font-size:10.5px;color:var(--ink-soft);margin-top:8px;text-transform:uppercase;letter-spacing:.08em}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.chip{font-family:'IBM Plex Mono',monospace;font-size:11px;border:1.5px solid var(--ink);padding:5px 12px;background:var(--white);text-transform:uppercase;letter-spacing:.04em}
.chip.hot{background:var(--kfc-red);color:var(--white);border-color:var(--kfc-red)}
.chip.ok{background:var(--ink);color:var(--white)}
.comp-fig{margin:34px 0;border:2px solid var(--ink);background:var(--white)}
.comp-fig img{width:100%;height:280px;object-fit:cover;display:block}
.comp-fig figcaption{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);padding:10px 14px;border-top:2px solid var(--ink);background:var(--cream)}
.band-red{background:var(--kfc-red);color:var(--white);margin:64px calc(-1*clamp(22px,4.5vw,72px));padding:44px clamp(22px,4.5vw,72px);border-top:2px solid var(--ink);border-bottom:2px solid var(--ink)}
.band-red .bt{font-family:'Archivo Black',sans-serif;font-size:clamp(20px,2.4vw,30px);text-transform:uppercase;max-width:26ch;line-height:1.15}
.band-red .bp{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;margin-top:14px;opacity:.85}
footer{border-top:2px solid var(--ink);padding:34px clamp(22px,4.5vw,72px) 54px;background:var(--cream)}
footer .stripe-bar{border-bottom:none;border-top:2px solid var(--ink);margin:0 calc(-1*clamp(22px,4.5vw,72px)) 26px}
.foot-grid{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1.3fr 1fr;gap:34px}
footer h5{font-family:'Archivo Black',sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;color:var(--kfc-red)}
footer p,footer li{font-size:12.5px;color:var(--ink-soft)}
footer ul{list-style:none}
footer li{padding:3px 0;border-bottom:1px dashed var(--line)}
.src{font-size:11.5px;color:var(--ink-soft);margin-top:16px;line-height:1.7}
.src b{color:var(--ink)}
.mobilenav{display:none}
@media(max-width:980px){.shell{grid-template-columns:1fr}.rail{display:none}.mobilenav{display:block;position:sticky;top:62px;z-index:99;background:var(--paper);border-bottom:2px solid var(--ink);padding:10px clamp(18px,4vw,28px)}.mobilenav select{width:100%;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:9px;border:2px solid var(--ink);background:var(--white);text-transform:uppercase}.grid2,.grid3{grid-template-columns:1fr}.hero-bucket{display:none}.foot-grid{grid-template-columns:1fr}.topbar .meta{display:none}.band-red{margin:64px -22px;padding:36px 22px}}
.rv{opacity:0;transform:translateY(14px);transition:opacity .55s ease,transform .55s ease}
.rv.in{opacity:1;transform:none}
#progress{position:fixed;top:0;left:0;height:3px;width:0;background:var(--kfc-red);z-index:200}
</style>
</head>
<body>
<div id="progress"></div>
<div class="stripe-bar stripes"></div>
<div class="topbar">
  <svg class="mark" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="30" cy="21" r="12" stroke="#141414" stroke-width="2.4" fill="#fff"/>
    <circle cx="25.5" cy="19" r="1.6" fill="#141414"/><circle cx="34.5" cy="19" r="1.6" fill="#141414"/>
    <path d="M24 25.5c2 2.2 10 2.2 12 0" stroke="#141414" stroke-width="2" stroke-linecap="round"/>
    <path d="M19 14c3-3 19-3 22 0" stroke="#141414" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M30 33l-8 8h16l-8-8z" fill="#e4002b" stroke="#141414" stroke-width="1.6"/>
    <path d="M12 58c2-9 8-13 18-13s16 4 18 13" stroke="#141414" stroke-width="2.4" fill="#fff"/>
  </svg>
  <div class="wordmark">The Colonel's <span class="k">Battleground</span></div>
  <div class="meta">Australian QSR Deep-Dive · Strategy support for KFC Australia · 2026</div>
</div>
