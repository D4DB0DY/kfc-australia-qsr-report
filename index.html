<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Colonel's Battleground — Australian QSR Industry Deep Research for KFC Australia</title>
<meta name="description" content="Deep research on Australia's quick service restaurant industry: competitive set, pricing, consumer trends and strategic recommendations for KFC Australia leadership.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<style>
  :root{
    --kfc-red:#e4002b;
    --kfc-deep:#a3001e;
    --ink:#141414;
    --ink-soft:#4a4640;
    --muted:#8b8172;
    --paper:#faf8f5;
    --cream:#f2ede3;
    --line:#e3dccd;
    --white:#ffffff;
    --navy:#26436b;
    --gold:#b08a2e;
    --green:#3f6d4e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',-apple-system,'Segoe UI',sans-serif;
    font-size:16px;line-height:1.72;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--kfc-red);color:#fff}
  .mono{font-family:'IBM Plex Mono',ui-monospace,monospace}
  .serif{font-family:'Fraunces',Georgia,serif}

  /* ---------- stripes ---------- */
  .stripes{background:repeating-linear-gradient(180deg,var(--kfc-red) 0 15%,var(--white) 15% 30%)}
  .stripes-v{background:repeating-linear-gradient(90deg,var(--kfc-red) 0 50%,var(--white) 50% 100%);background-size:72px 100%}
  .stripe-bar{height:52px}

  /* ---------- top bar ---------- */
  .topbar{position:relative;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:16px clamp(20px,4vw,52px);background:var(--white);border-bottom:2px solid var(--ink)}
  .brandmark{display:flex;align-items:center;gap:12px;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;letter-spacing:.12em;color:var(--ink);text-decoration:none}
  .brandmark .colonel{width:34px;height:34px;flex-shrink:0}
  .topbar .meta{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

  /* ---------- hero ---------- */
  .hero{
    position:relative;background:var(--cream);
    padding:clamp(40px,5vw,72px) clamp(20px,4vw,52px) 0;
    overflow:hidden;border-bottom:2px solid var(--ink);
  }
  .hero-inner{position:relative;z-index:2;max-width:1440px;margin:0 auto;display:grid;grid-template-columns:minmax(0,1.25fr) minmax(0,1fr);gap:clamp(28px,4vw,64px);align-items:center}
  .kicker{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--kfc-red);display:inline-flex;align-items:center;gap:10px;font-weight:600}
  .kicker::before{content:"";width:34px;height:2px;background:var(--kfc-red)}
  h1.hero-title{font-family:'Archivo Black','Fraunces',sans-serif;font-size:clamp(40px,5.6vw,84px);line-height:.97;letter-spacing:-.005em;margin:26px 0 24px;text-transform:uppercase;color:var(--ink)}
  h1.hero-title .red{color:var(--kfc-red)}
  .hero-sub{font-size:clamp(16px,1.5vw,19px);color:var(--ink-soft);max-width:600px;line-height:1.62;margin-bottom:40px}
  .hero-bucket{position:relative;justify-self:center;width:min(88%,440px);margin-right:clamp(0px,3vw,48px)}
  .hero-bucket .halo{position:absolute;inset:-12%;border-radius:50%;background:repeating-conic-gradient(var(--kfc-red) 0 12deg,var(--white) 12deg 24deg);animation:spin 40s linear infinite;z-index:0}
  .hero-bucket img{position:relative;z-index:1;width:100%;filter:drop-shadow(0 34px 44px rgba(20,0,0,.35))}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hero-stats{position:relative;z-index:2;max-width:1440px;margin:40px auto 0;display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));border-top:2px solid var(--ink)}
  .hstat{padding:22px 22px 26px 0;border-right:1px solid var(--line);margin-right:22px}
  .hstat:last-child{border-right:none}
  .hstat .num{font-family:'Archivo Black','Fraunces',sans-serif;font-size:clamp(30px,3vw,44px);line-height:1.05;color:var(--ink)}
  .hstat .lbl{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-top:9px;line-height:1.5}
  @media (max-width:900px){.hero-inner{grid-template-columns:1fr}.hero-bucket{width:min(72vw,380px);margin-top:8px}}

  /* ---------- ticker ---------- */
  .ticker{background:var(--ink);color:var(--white);overflow:hidden;border-bottom:2px solid var(--ink)}
  .ticker-track{display:flex;gap:0;white-space:nowrap;width:max-content;animation:tick 30s linear infinite}
  .ticker span{font-family:'Archivo Black',sans-serif;font-size:15px;letter-spacing:.18em;text-transform:uppercase;padding:14px 0}
  .ticker .dot{color:var(--kfc-red);padding:14px 22px}
  @keyframes tick{to{transform:translateX(-50%)}}

  /* ---------- layout with chapter rail ---------- */
  .shell{display:grid;grid-template-columns:250px minmax(0,1fr);max-width:1440px;margin:0 auto}
  nav.rail{position:sticky;top:0;height:100vh;overflow-y:auto;padding:48px 26px 40px 38px;border-right:1px solid var(--line);background:var(--paper)}
  .rail-head{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
  .rail a{display:flex;gap:12px;align-items:baseline;text-decoration:none;color:var(--ink-soft);padding:9px 0;font-size:13.5px;line-height:1.35;transition:color .2s}
  .rail a .idx{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);min-width:22px;transition:color .2s}
  .rail a:hover{color:var(--ink)}
  .rail a.active{color:var(--kfc-red);font-weight:600}
  .rail a.active .idx{color:var(--kfc-red)}
  .rail-foot{margin-top:32px}
  .rail-foot .mini-stripes{display:grid;grid-template-columns:repeat(5,10px);gap:5px;margin-bottom:14px}
  .rail-foot .mini-stripes i{height:34px;background:var(--kfc-red)}
  .rail-foot .mini-stripes i:nth-child(even){background:var(--ink)}
  .rail-foot p{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);line-height:1.7;letter-spacing:.06em}

  main{padding:0 clamp(22px,4.5vw,72px) 120px;min-width:0}
  section.chapter{padding-top:76px;scroll-margin-top:10px}
  .ch-head{display:flex;align-items:baseline;gap:20px;border-bottom:3px solid var(--kfc-red);padding-bottom:18px;margin-bottom:38px;flex-wrap:wrap}
  .ch-num{font-family:'Archivo Black',sans-serif;font-size:15px;letter-spacing:.1em;color:var(--kfc-red)}
  .ch-title{font-family:'Archivo Black','Fraunces',sans-serif;font-size:clamp(28px,3.4vw,46px);line-height:1.04;letter-spacing:-.005em;text-transform:uppercase}
  .ch-deck{font-size:17px;color:var(--ink-soft);max-width:760px;margin:-18px 0 34px}
  .content{max-width:780px}
  h3{font-family:'Fraunces',serif;font-size:23px;font-weight:600;margin:44px 0 14px;line-height:1.25}
  h4{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--kfc-red);margin:34px 0 12px;font-weight:600}
  p{margin-bottom:18px;color:var(--ink-soft)}
  p strong,li strong{color:var(--ink)}
  .lead{font-size:19px;line-height:1.7;color:var(--ink)}
  ul.tight{margin:0 0 20px 22px}
  ul.tight li{margin-bottom:10px;color:var(--ink-soft)}
  sup.cite{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500}
  sup.cite a{color:var(--kfc-red);text-decoration:none;padding:0 1px}
  sup.cite a:hover{text-decoration:underline}

  .callout{border-left:4px solid var(--kfc-red);background:var(--white);border-top:1px solid var(--line);border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:20px 26px;margin:30px 0;font-size:15.5px;color:var(--ink)}
  .callout .co-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--kfc-red);display:block;margin-bottom:8px;font-weight:600}

  .exhibit{margin:52px calc(-1 * clamp(0px,2vw,28px));padding:34px clamp(20px,3vw,44px);background:var(--white);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .exhibit-head{display:flex;justify-content:space-between;align-items:baseline;gap:16px;flex-wrap:wrap;margin-bottom:8px}
  .exhibit-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--kfc-red);font-weight:600}
  .exhibit-src{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.04em}
  .chart{width:100%;height:460px}
  .chart.tall{height:520px}
  @media (max-width:760px){.chart{height:380px}.chart.tall{height:440px}}

  /* red band break */
  .band-red{background:var(--kfc-red);color:var(--white);margin:64px calc(-1 * clamp(22px,4.5vw,72px));padding:44px clamp(22px,4.5vw,72px);border-top:2px solid var(--ink);border-bottom:2px solid var(--ink)}
  .band-red .br-k{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;opacity:.85;margin-bottom:14px;font-weight:600}
  .band-red .br-t{font-family:'Archivo Black',sans-serif;font-size:clamp(22px,2.6vw,34px);line-height:1.15;text-transform:uppercase;max-width:900px}
  .band-red .br-s{margin-top:14px;font-size:14.5px;opacity:.92;max-width:760px;line-height:1.6}
  #progress{position:fixed;top:0;left:0;height:3px;width:0;background:var(--kfc-red);z-index:200;transition:width .12s linear}

  .tbl-wrap{overflow-x:auto;margin:34px 0;border-top:3px solid var(--ink)}
  table{width:100%;border-collapse:collapse;font-size:13.8px;min-width:680px}
  caption{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding:12px 0}
  th{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;text-align:left;color:var(--white);padding:12px 14px;background:var(--ink);white-space:nowrap}
  td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:top;color:var(--ink-soft);line-height:1.5}
  td b,td strong{color:var(--ink)}
  tr.hl td{background:#fdeef0}
  td .pill{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.1em;padding:2px 8px;border:1px solid var(--line);text-transform:uppercase;color:var(--ink-soft);margin-right:4px;white-space:nowrap}
  td .pill.red{border-color:var(--kfc-red);color:var(--kfc-red)}

  .swot{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);margin:36px 0}
  .swot>div{background:var(--white);padding:26px 28px}
  .swot h5{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .swot h5::before{content:"";width:10px;height:10px;background:var(--ink)}
  .swot .s h5::before{background:var(--green)}
  .swot .w h5::before{background:var(--gold)}
  .swot .o h5::before{background:var(--navy)}
  .swot .t h5::before{background:var(--kfc-red)}
  .swot li{margin-bottom:10px;font-size:14px;color:var(--ink-soft);margin-left:16px}
  @media (max-width:820px){.swot{grid-template-columns:1fr}}

  .rec{border-top:1px solid var(--line);padding:30px 0;display:grid;grid-template-columns:64px 1fr;gap:22px}
  .rec:last-child{border-bottom:1px solid var(--line)}
  .rec .rn{font-family:'Archivo Black',sans-serif;font-size:38px;color:var(--kfc-red);line-height:1}
  .rec h6{font-family:'Fraunces',serif;font-size:21px;font-weight:600;margin-bottom:8px}
  .rec p{font-size:14.8px;margin-bottom:10px}
  .rec .kpi{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--navy);letter-spacing:.04em;border-left:2px solid var(--navy);padding-left:12px;margin-top:8px;line-height:1.6}

  .sources li{list-style:none;font-size:13px;color:var(--ink-soft);padding:9px 0;border-bottom:1px dashed var(--line);display:flex;gap:14px;line-height:1.5}
  .sources li .snum{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--kfc-red);min-width:30px;padding-top:3px;flex-shrink:0}
  .sources a{color:var(--navy);text-decoration:none;word-break:break-all}
  .sources a:hover{text-decoration:underline}

  footer{border-top:3px solid var(--ink);margin-top:90px;padding:34px 0 10px;font-size:12.5px;color:var(--muted);line-height:1.8}
  footer .disc{max-width:820px}

  .rv{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease}
  .rv.on{opacity:1;transform:none}

  .comp-fig{margin:34px 0;border:2px solid var(--ink);background:var(--white)}
  .comp-fig img{width:100%;height:280px;object-fit:cover;display:block}
  .comp-fig figcaption{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);padding:10px 14px;border-top:2px solid var(--ink);background:var(--cream)}
  .mobilenav{display:none;position:sticky;top:0;z-index:100;background:var(--white);border-bottom:2px solid var(--ink);padding:12px 20px}
  .mobilenav select{width:100%;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:10px;background:var(--paper);border:1px solid var(--line);color:var(--ink)}
  @media (max-width:1020px){.shell{grid-template-columns:1fr}nav.rail{display:none}.mobilenav{display:block}}
</style>
</head>
<body>
<div id="progress"></div>
<div class="stripe-bar stripes"></div>
<div class="topbar">
  <span class="brandmark"><svg class="colonel" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="24" cy="24" r="23" fill="#e4002b"/><path d="M24 9c-4.4 0-7 2.8-7 6.4 0 2.4 1.1 4.3 2.6 5.4-.6.2-2.1.8-2.1 2.4 0 1.8 2 2.4 2 2.4-.8.5-2.5 1.3-2.5 3.2 0 2.3 3.1 2.7 3.1 4.7 0 1.2-1 1.7-1 3.1 0 2 2.3 3.4 4.9 3.4s4.9-1.4 4.9-3.4c0-1.4-1-1.9-1-3.1 0-2 3.1-2.4 3.1-4.7 0-1.9-1.7-2.7-2.5-3.2 0 0 2-.6 2-2.4 0-1.6-1.5-2.2-2.1-2.4 1.5-1.1 2.6-3 2.6-5.4 0-3.6-2.6-6.4-7-6.4z" fill="#fff"/><circle cx="21.2" cy="16.6" r="1.15" fill="#141414"/><circle cx="26.8" cy="16.6" r="1.15" fill="#141414"/><path d="M20.6 14.9c.9-.7 2-.7 2.7-.2M24.7 14.7c.7-.5 1.8-.5 2.7.2" stroke="#141414" stroke-width=".9" stroke-linecap="round"/><path d="M21.6 21.6c.7.8 1.5 1.2 2.4 1.2s1.7-.4 2.4-1.2" stroke="#141414" stroke-width="1" stroke-linecap="round"/><path d="M24 30.5l-2.6 2.6 1 4.4 1.6-2 1.6 2 1-4.4z" fill="#141414"/></svg><span>THE COLONEL'S BATTLEGROUND</span></span>
  <span class="meta">Deep Research · July 2026 · For KFC Australia Leadership</span>
</div>
<header class="hero">
  <div class="hero-inner">
    <div>
      <span class="kicker">Industry &amp; Strategy Report · Australian QSR</span>
      <h1 class="hero-title">The Colonel's<br><span class="red" style="font-size:.62em;letter-spacing:.01em">Battleground:</span><br>Australian QSR, decoded.</h1>
